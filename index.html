<script>
window.__preLog = [];
window.__openCvLoadState = 'pending';
function earlyLog(msg) {
  window.__preLog.push(msg);
  try { console.log('[opencv-boot] ' + msg); } catch (e) {}
}
(function () {
  try {
    const resolvedUrl = new URL('opencv.js', document.baseURI).href;
    earlyLog('Спроба завантажити opencv.js за адресою: ' + resolvedUrl);
  } catch (e) {
    earlyLog('Не вдалося обчислити абсолютний шлях до opencv.js: ' + e.message);
  }
})();
function onOpenCvScriptError(ev) {
  window.__openCvLoadState = 'script-error';
  earlyLog('ПОМИЛКА: тег <script src="opencv.js"> не завантажився (onerror).');
  if (window.__cvErrorCallback) window.__cvErrorCallback();
}
function onOpenCvScriptLoaded() {
  window.__openCvLoadState = 'script-loaded';
  earlyLog('Тег <script src="opencv.js"> відпрацював (onload). Перевіряю глобальний cv...');
  if (typeof cv === 'undefined') {
    window.__openCvLoadState = 'cv-undefined';
    earlyLog('ПОМИЛКА: глобальна змінна cv не визначена.');
    if (window.__cvErrorCallback) window.__cvErrorCallback();
    return;
  }
  if (cv && typeof cv.then === 'function') {
    earlyLog('cv є Promise (MODULARIZE-збірка) — чекаю резолву WASM runtime...');
    cv.then(function (resolvedCv) {
      window.cv = resolvedCv;
      window.__openCvLoadState = 'ready';
      earlyLog('cv Promise резолвнувся — WASM runtime готовий.');
      if (window.__cvReadyCallback) window.__cvReadyCallback();
    }).catch(function (err) {
      window.__openCvLoadState = 'promise-rejected';
      earlyLog('ПОМИЛКА: cv Promise відхилено: ' + (err && err.message ? err.message : String(err)));
      if (window.__cvErrorCallback) window.__cvErrorCallback();
    });
  } else {
    earlyLog('cv — не Promise (класична збірка) — підключаю onRuntimeInitialized...');
    cv['onRuntimeInitialized'] = function () {
      window.__openCvLoadState = 'ready';
      earlyLog('onRuntimeInitialized спрацював — WASM runtime готовий.');
      if (window.__cvReadyCallback) window.__cvReadyCallback();
    };
  }
}
</script>
<script async src="opencv.js" onload="onOpenCvScriptLoaded();" onerror="onOpenCvScriptError(event);" type="text/javascript"></script>

<script>
/* ================================================================
   ГЕОМЕТРІЯ КВАДРАТА — 24×24 сітка, 4 кутові маяки 5×5,
   "тиха" рамка навколо вирізу 11×11, 4 сторони даних по 55 клітин.
   Портовано з "Орнамент квадрат_2.html", узгоджено з архітектурою
   диска (4 фізичні секції: 3 даних + 1 чексум, ротаційний пошук СТАРТу).
   ================================================================ */
const GRID_SIZE = 24;
const CELL = 20;
const MARGIN_CELLS = 2;               // "тиха зона" з полів навколо коду — для стійкості розпізнавання
const OFFSET = MARGIN_CELLS * CELL;
const DIAGRAM = (GRID_SIZE + MARGIN_CELLS * 2) * CELL; // 560

const BEACON_SIZE = 5;                // кутові маяки 5×5
const CUTOUT_START = 6, CUTOUT_LEN = 12; // виріз під фото 12×12 (клітини 6..17)
const QUIET_START = 5, QUIET_END = 18;   // рамка навколо вирізу

const SECTIONS = 4;                   // фізичних сторін: верх/право/низ/ліво
const PHYSICAL_BITS_PER_SIDE = CUTOUT_LEN * BEACON_SIZE; // 12 × 5 = 60 клітин на сторону
const BG_COLOR = '#ffffff';

function cellTopLeftPx(r, c) { return { x: OFFSET + c * CELL, y: OFFSET + r * CELL }; }
function cellCenterPx(r, c) { return { x: OFFSET + c * CELL + CELL / 2, y: OFFSET + r * CELL + CELL / 2 }; }

function isBeaconArea(r, c) {
  if (r < BEACON_SIZE && c < BEACON_SIZE) return true;
  if (r < BEACON_SIZE && c >= GRID_SIZE - BEACON_SIZE) return true;
  if (r >= GRID_SIZE - BEACON_SIZE && c < BEACON_SIZE) return true;
  if (r >= GRID_SIZE - BEACON_SIZE && c >= GRID_SIZE - BEACON_SIZE) return true;
  return false;
}
function isBeaconPixel(r, c) {
  const localR = r >= GRID_SIZE - BEACON_SIZE ? r - (GRID_SIZE - BEACON_SIZE) : r;
  const localC = c >= GRID_SIZE - BEACON_SIZE ? c - (GRID_SIZE - BEACON_SIZE) : c;
  if (localR === 0 || localR === BEACON_SIZE - 1 || localC === 0 || localC === BEACON_SIZE - 1) return true;
  if (localR === 2 && localC === 2) return true; // центральна крапка
  return false;
}
function isQuietRing(r, c) {
  if (r >= QUIET_START && r <= QUIET_END && c >= QUIET_START && c <= QUIET_END) {
    return r === QUIET_START || r === QUIET_END || c === QUIET_START || c === QUIET_END;
  }
  return false;
}
function isCutout(r, c) {
  return r >= CUTOUT_START && r < CUTOUT_START + CUTOUT_LEN && c >= CUTOUT_START && c < CUTOUT_START + CUTOUT_LEN;
}

// Порядок сторін фіксований і однаковий і в енкодері, і в декодері.
const SIDE_NAMES = ['top', 'right', 'bottom', 'left'];
function buildSideCoords() {
  const top = [], right = [], bottom = [], left = [];
  
  // top: рухаємось зліва направо вздовж краю, і згори донизу вглиб
  for (let c = CUTOUT_START; c < CUTOUT_START + CUTOUT_LEN; c++) 
    for (let r = 0; r < BEACON_SIZE; r++) top.push({ r, c });

  // right: рухаємось згори донизу вздовж краю, і справа наліво вглиб
  for (let r = CUTOUT_START; r < CUTOUT_START + CUTOUT_LEN; r++) 
    for (let c = GRID_SIZE - 1; c >= GRID_SIZE - BEACON_SIZE; c--) right.push({ r, c });

  // bottom: рухаємось справа наліво вздовж краю, і знизу вгору вглиб
  for (let c = CUTOUT_START + CUTOUT_LEN - 1; c >= CUTOUT_START; c--) 
    for (let r = GRID_SIZE - 1; r >= GRID_SIZE - BEACON_SIZE; r--) bottom.push({ r, c });

  // left: рухаємось знизу вгору вздовж краю, і зліва направо вглиб
  for (let r = CUTOUT_START + CUTOUT_LEN - 1; r >= CUTOUT_START; r--) 
    for (let c = 0; c < BEACON_SIZE; c++) left.push({ r, c });
    
  return [top, right, bottom, left]; 
}
const SIDE_CELL_COORDS = buildSideCoords();

// Зворотна мапа для рендеру: [r][c] -> {side, idx} для клітин-даних.
const SIDE_INDEX_GRID = Array.from({ length: GRID_SIZE }, () => new Array(GRID_SIZE).fill(null));
SIDE_CELL_COORDS.forEach((coords, side) => {
  coords.forEach(({ r, c }, idx) => { SIDE_INDEX_GRID[r][c] = { side, idx }; });
});

// Кутові маяки (центральна крапка кожного) — опорні точки для перспективи.
const DST_CORNERS = [
  cellCenterPx(2, 2),                               // верхній-лівий
  cellCenterPx(2, GRID_SIZE - 3),                    // верхній-правий
  cellCenterPx(GRID_SIZE - 3, GRID_SIZE - 3),        // нижній-правий
  cellCenterPx(GRID_SIZE - 3, 2)                     // нижній-лівий
];

/* ================================================================
   КОДБУК: 33 кирилиці / 26 латиниці (спільні коди-позиції, різні гліфи)
   + 10 цифр + 19 спецсимволів (7 попередніх + 12 нових) + СТАРТ/PAD.
   33 + 10 + 19 + 2 = 64 = 2^6 — рівно стеля 6-бітного символу, вільних
   слотів не лишилось. Тому нижче є ЯВНА перевірка на цю межу: якщо
   колись сюди додадуть ще один символ і вона мовчки пропаде — раніше
   idx.toString(2) міг дати 7+ біт замість 6, і padStart це не обрізає,
   через що ВЕСЬ потік бітів у секції зсувався на позицію.
   ================================================================ */
const CYRILLIC_LETTERS = "АБВГҐДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ".split('');
const LATIN_LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').concat([null, null, null, null, null, null, null]);
if (CYRILLIC_LETTERS.length !== LATIN_LETTERS.length) {
  throw new Error('CYRILLIC_LETTERS і LATIN_LETTERS мають бути однакової довжини (спільні коди-позиції).');
}
const LETTER_SLOT_COUNT = CYRILLIC_LETTERS.length; // 33

const DIGIT_CHARS = "0123456789".split('');
const SPECIAL_CHARS = " .,@'+-".split('').concat(':;()%/*=#"_'.split(''));

const START_UK_CHAR = '\u0001';
const START_EN_CHAR = '\u0003';
const PAD_CHAR = '\u0002';
const BITS_PER_SYMBOL = 6;
const CODEBOOK_MAX = 1 << BITS_PER_SYMBOL; // 64

const NON_LETTER_CODEBOOK = DIGIT_CHARS.concat(SPECIAL_CHARS).concat([START_UK_CHAR, START_EN_CHAR, PAD_CHAR]);
const CODEBOOK_LENGTH = LETTER_SLOT_COUNT + NON_LETTER_CODEBOOK.length;
if (CODEBOOK_LENGTH > CODEBOOK_MAX) {
  const msg = `КРИТИЧНО: кодбук (${CODEBOOK_LENGTH} символів) перевищує межу 6-бітного символу (${CODEBOOK_MAX}). ` +
    `Заберіть зайві символи — інакше кодування бітів мовчки зсунеться і код стане нечитабельним.`;
  earlyLog ? earlyLog(msg) : console.error(msg);
  throw new Error(msg);
}
const START_UK_IDX = LETTER_SLOT_COUNT + DIGIT_CHARS.length + SPECIAL_CHARS.length;
const START_EN_IDX = START_UK_IDX + 1;
const PAD_IDX = START_EN_IDX + 1;

// Генератор псевдовипадкових бітів (маска) для хаотичності візерунка
function getMaskBit(sectionIdx, bitIdx) {
  let n = sectionIdx * 73 + bitIdx * 37 + 11;
  n = (n ^ (n << 13)) >>> 0;
  n = (n ^ (n >>> 17)) >>> 0;
  n = (n ^ (n << 5)) >>> 0;
  return n & 1;
}

function glyphTable(lang) {
  return (lang === 'en' ? LATIN_LETTERS : CYRILLIC_LETTERS).concat(NON_LETTER_CODEBOOK);
}
function charToIndex(ch, lang) {
  if (ch === START_UK_CHAR) return START_UK_IDX;
  if (ch === START_EN_CHAR) return START_EN_IDX;
  if (ch === PAD_CHAR) return PAD_IDX;
  const table = glyphTable(lang);
  return table.indexOf(ch);
}
function indexToChar(idx, lang) {
  if (idx === START_UK_IDX) return START_UK_CHAR;
  if (idx === START_EN_IDX) return START_EN_CHAR;
  if (idx === PAD_IDX) return PAD_CHAR;
  const table = glyphTable(lang);
  return table[idx];
}

const MESSAGE_CHARS_FOR_UI = { uk: CYRILLIC_LETTERS.filter(Boolean), en: LATIN_LETTERS.filter(Boolean) };

// 54 активних біти/сторону (+ 1 резервний біт для рівності геометрії
// квадрата — 55 клітин фізично на сторону, символьна місткість рахується
// від 54, щоб ACTIVE*3 ділилось на 6 без залишку; резервна клітина
// завжди 0 і декодером ігнорується).
// Резервних біт має бути рівно стільки, щоб ACTIVE_BITS_PER_SECTION лишався
// парним — тоді ACTIVE*3 завжди ділиться на 6 без залишку. При вирізі 11×11
// PHYSICAL_BITS_PER_SIDE=55 (непарне) — потрібен 1 резервний біт (54 активних,
// як було раніше). При вирізі 12×12 PHYSICAL_BITS_PER_SIDE=60 (парне) —
// резерв не потрібен, усі 60 біт стають активними.
const RESERVE_BITS_PER_SECTION = PHYSICAL_BITS_PER_SIDE % 2;
const ACTIVE_BITS_PER_SECTION = PHYSICAL_BITS_PER_SIDE - RESERVE_BITS_PER_SECTION;
const DATA_SYMBOL_SLOTS = Math.floor((ACTIVE_BITS_PER_SECTION * 3) / BITS_PER_SYMBOL);
const SYMBOLS_PER_SECTION = DATA_SYMBOL_SLOTS / 3;
const MAX_MESSAGE_LEN = DATA_SYMBOL_SLOTS - 2;

document.getElementById('maxLenLabel').textContent = MAX_MESSAGE_LEN;

let currentLang = 'uk'; // 'uk' | 'en'

function renderAlphabetBlocks() {
  const letters = currentLang === 'en' ? MESSAGE_CHARS_FOR_UI.en : MESSAGE_CHARS_FOR_UI.uk;
  document.getElementById('blockLetters').innerHTML = '<strong>Букви:</strong> ' + letters.join(' ');
  document.getElementById('blockDigits').innerHTML = '<strong>Цифри:</strong> ' + DIGIT_CHARS.join(' ');
  document.getElementById('blockSpecial').innerHTML = '<strong>Спец:</strong> ' + SPECIAL_CHARS.join(' ');
  document.getElementById('langLabel').textContent = currentLang === 'en' ? 'латиниця' : 'кирилиця';
  document.getElementById('langToggleBtn').textContent = currentLang === 'en' ? 'ENG' : 'УКР';
}
document.getElementById('capacityNote').textContent = '';

function textToSections(message, lang) {
  if (message.length > MAX_MESSAGE_LEN) {
    throw new Error('Задовге повідомлення (максимум ' + MAX_MESSAGE_LEN + ')');
  }
  const symbols = [(lang === 'en' ? START_EN_CHAR : START_UK_CHAR)].concat(message.split(''));
  while (symbols.length < DATA_SYMBOL_SLOTS) symbols.push(PAD_CHAR);

  const sections = [[], [], []];
  for (let i = 0; i < DATA_SYMBOL_SLOTS; i++) {
    const ch = symbols[i];
    const idx = charToIndex(ch, lang);
    if (idx === -1 || idx === undefined) {
      log('Помилка: символ "' + ch + '" не підтримується в поточній мові.');
      throw new Error('Символ "' + ch + '" не підтримується в поточній мові (' + lang + ').');
    }
    const bin = idx.toString(2).padStart(BITS_PER_SYMBOL, '0');
    for (const b of bin) sections[i % 3].push(b === '1' ? 1 : 0);
  }
  const checksum = new Array(ACTIVE_BITS_PER_SECTION).fill(0);
  // Перші BITS_PER_SYMBOL бітів чек-суми навмисно ЗАВЖДИ 0 (сентинел),
  // а не XOR — інакше чек-сума як "звичайний XOR-мотлох" мала б ~1/64
  // шанс випадково збігтися з 6-бітним кодом СТАРТ (ідентифіковано
  // тестом), і reassembleWithRotation міг би хибно "знайти" СТАРТ на
  // невірному фізичному повороті. Два РЕАЛЬНІ символи повідомлення
  // (sections[1][0..5], sections[2][0..5]) так ніколи не збігаються,
  // бо СТАРТ/PAD-індекси (61,62,63) за протоколом зарезервовані й не
  // видаються жодному звичайному символу — тож саме нульовий сентинел
  // тут закриває єдину реальну діру. checksumAgreement() відповідно
  // ігнорує ці ж перші BITS_PER_SYMBOL бітів при звірці.
  for (let i = BITS_PER_SYMBOL; i < ACTIVE_BITS_PER_SECTION; i++) {
    checksum[i] = sections[0][i] ^ sections[1][i] ^ sections[2][i];
  }
  sections.push(checksum);
  
  // Застосовуємо маску до всіх бітів (включаючи чек-суму), щоб візерунок
  // завжди був хаотичним навіть для коротких слів (де багато нулів або PAD).
  for (let s = 0; s < SECTIONS; s++) {
    for (let i = 0; i < ACTIVE_BITS_PER_SECTION; i++) {
      sections[s][i] ^= getMaskBit(s, i);
    }
  }
  return sections;
}

function decodeSectionsToText(sections, lang) {
  let text = '';
  for (let pos = 0; pos < SYMBOLS_PER_SECTION; pos++) {
    for (let sec = 0; sec < 3; sec++) {
      const bits = sections[sec].slice(pos * BITS_PER_SYMBOL, (pos + 1) * BITS_PER_SYMBOL);
      const idx = parseInt(bits.join(''), 2);
      const ch = indexToChar(idx, lang);
      if (ch === START_UK_CHAR || ch === START_EN_CHAR) continue;
      if (ch === PAD_CHAR) return text;
      text += (ch === undefined || ch === null) ? '?' : ch;
    }
  }
  return text;
}

/* ================================================================
   МАЛЮВАННЯ ЕНКОДЕРА (canvas, клітина за клітиною)
   ================================================================ */
const bitsColor = document.getElementById('bitsColor');
const anchorsColor = document.getElementById('anchorsColor');
const clearPhotoBtn = document.getElementById('clearPhotoBtn');
const langToggleBtn = document.getElementById('langToggleBtn');
const bitScaleSlider = document.getElementById('bitScaleSlider');
const bitScaleLabel = document.getElementById('bitScaleLabel');
const crossStitchCb = document.getElementById('crossStitchCb');

let bitScaleValue = 1.0;

function drawCell(ctx, r, c, color) {
  const { x, y } = cellTopLeftPx(r, c);
  const s = CELL * bitScaleValue;
  const offset = (CELL - s) / 2;
  
  if (crossStitchCb.checked && !isBeaconArea(r, c)) {
    ctx.strokeStyle = color;
    const lw = s * 0.35;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    const inset = lw / 2;
    ctx.beginPath();
    ctx.moveTo(x + offset + inset, y + offset + inset);
    ctx.lineTo(x + offset + s - inset, y + offset + s - inset);
    ctx.moveTo(x + offset + s - inset, y + offset + inset);
    ctx.lineTo(x + offset + inset, y + offset + s - inset);
    ctx.stroke();
  } else {
    ctx.fillStyle = color;
    ctx.fillRect(x + offset, y + offset, s, s);
  }
}

bitsColor.addEventListener('input', refresh);
anchorsColor.addEventListener('input', refresh);
crossStitchCb.addEventListener('change', refresh);
bitScaleSlider.addEventListener('input', () => {
  bitScaleValue = parseInt(bitScaleSlider.value, 10) / 100;
  bitScaleLabel.textContent = bitScaleSlider.value + '%';
  refresh();
});
langToggleBtn.addEventListener('click', () => {
  currentLang = currentLang === 'en' ? 'uk' : 'en';
  renderAlphabetBlocks();
  refresh();
  log(`Мова вводу перемкнена на: ${currentLang === 'en' ? 'латиниця' : 'кирилиця'}.`);
});

function render(ctx, sections, photoImg) {
  ctx.clearRect(0, 0, DIAGRAM, DIAGRAM);
  // Забираємо замальовку фону (BG_COLOR), щоб PNG зберігався з прозорістю

  // Фото малюємо ПЕРШИМ, під сіткою — квадратний виріз без круглої маски.
  if (photoImg) {
    const cutoutX = OFFSET + CUTOUT_START * CELL;
    const cutoutY = cutoutX; // виріз симетричний по обох осях
    const cutoutSize = CUTOUT_LEN * CELL;
    const baseScale = Math.max(cutoutSize / photoImg.width, cutoutSize / photoImg.height);
    const scale = baseScale * photoScale;
    const w = photoImg.width * scale, h = photoImg.height * scale;
    ctx.save();
    ctx.beginPath();
    ctx.rect(cutoutX, cutoutY, cutoutSize, cutoutSize);
    ctx.clip();
    ctx.drawImage(photoImg, photoX - w / 2, photoY - h / 2, w, h);
    ctx.restore();
  }

  // Логічні секції (0,1,2 = дані, 3 = чексума) -> фізичні сторони.
  // Той самий зсув "(s+3)%SECTIONS", що й на диску: конкретне значення
  // зсуву не важливе для коректності — ротаційний пошук СТАРТу під час
  // декодування переберe всі 4 фази й знайде правильну.
  const fullBySide = [null, null, null, null];
  for (let s = 0; s < SECTIONS; s++) {
    const targetSide = (s + 3) % SECTIONS;
    fullBySide[targetSide] = sections[s].concat(new Array(RESERVE_BITS_PER_SECTION).fill(0)); // активні біти + резерв (якщо є)
  }

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (isCutout(r, c)) continue;      // фото вже намальоване
      if (isQuietRing(r, c)) continue;   // біла рамка навколо вирізу
      if (isBeaconArea(r, c)) {
        if (isBeaconPixel(r, c)) drawCell(ctx, r, c, anchorsColor.value);
        continue;
      }
      const info = SIDE_INDEX_GRID[r][c];
      if (info && fullBySide[info.side][info.idx] === 1) {
        drawCell(ctx, r, c, bitsColor.value);
      }
    }
  }
}

}

const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');
const msgInput = document.getElementById('msgInput');
const counter = document.getElementById('counter');
const errorBox = document.getElementById('errorBox');
const photoInput = document.getElementById('photoInput');
const downloadBtn = document.getElementById('downloadBtn');
const downloadSvgBtn = document.getElementById('downloadSvgBtn');

const photoJoystickGroup = document.getElementById('photoJoystickGroup');
const joyCenterBtn = document.getElementById('joyCenterBtn');
const photoScaleSlider = document.getElementById('photoScaleSlider');
const photoScaleLabel = document.getElementById('photoScaleLabel');

let currentPhotoImg = null;
let currentSections = null;
let photoX = DIAGRAM / 2;
let photoY = DIAGRAM / 2;
let photoScale = 1;

function refresh() {
  const text = msgInput.value.toUpperCase();
  counter.textContent = text.length + ' / ' + MAX_MESSAGE_LEN;
  counter.classList.toggle('over', text.length > MAX_MESSAGE_LEN);

  try {
    currentSections = textToSections(text, currentLang);
    render(ctx, currentSections, currentPhotoImg);
    errorBox.textContent = '';
    downloadBtn.disabled = false;
    log(`Намальовано (${currentLang}): "${text}" (${text.length}/${MAX_MESSAGE_LEN} симв.)`);
  } catch (e) {
    errorBox.textContent = e.message;
    downloadBtn.disabled = true;
  }
}
msgInput.addEventListener('input', refresh);
photoInput.addEventListener('change', () => {
  const file = photoInput.files[0];
  if (!file) { currentPhotoImg = null; photoJoystickGroup.style.display = 'none'; refresh(); return; }
  const img = new Image();
  img.onload = () => {
    currentPhotoImg = img;
    photoX = DIAGRAM / 2; photoY = DIAGRAM / 2;
    photoScale = 1;
    photoScaleSlider.value = 100;
    photoScaleLabel.textContent = '100%';
    photoJoystickGroup.style.display = 'flex';
    refresh();
  };
  img.src = URL.createObjectURL(file);
});
clearPhotoBtn.addEventListener('click', () => {
  currentPhotoImg = null;
  photoInput.value = '';
  photoScale = 1;
  photoScaleSlider.value = 100;
  photoScaleLabel.textContent = '100%';
  photoJoystickGroup.style.display = 'none';
  refresh();
  log('Фото очищено.');
});
photoScaleSlider.addEventListener('input', () => {
  photoScale = parseInt(photoScaleSlider.value, 10) / 100;
  photoScaleLabel.textContent = photoScaleSlider.value + '%';
  if (!currentPhotoImg) return;
  render(ctx, currentSections, currentPhotoImg);
});

/* ================================================================
   ДЖОЙСТИК ПОЗИЦІОНУВАННЯ
   ================================================================ */
const JOY_STEP = 4;
const JOY_REPEAT_MS = 90;
let joyInterval = null;

function clampPhoto() {
  const cx = DIAGRAM / 2, cy = DIAGRAM / 2;
  const limit = DIAGRAM / 2;
  const dx = photoX - cx, dy = photoY - cy;
  if (Math.hypot(dx, dy) > limit) {
    const angle = Math.atan2(dy, dx);
    photoX = cx + Math.cos(angle) * limit;
    photoY = cy + Math.sin(angle) * limit;
  }
}
function nudgePhoto(dx, dy) {
  if (!currentPhotoImg) return;
  photoX += dx * JOY_STEP;
  photoY += dy * JOY_STEP;
  clampPhoto();
  render(ctx, currentSections, currentPhotoImg);
}
function stopJoy() {
  if (joyInterval) { clearInterval(joyInterval); joyInterval = null; }
}
function startJoy(dx, dy) {
  stopJoy();
  nudgePhoto(dx, dy);
  joyInterval = setInterval(() => nudgePhoto(dx, dy), JOY_REPEAT_MS);
}
document.querySelectorAll('.joy-btn[data-dx]').forEach(btn => {
  const dx = parseInt(btn.dataset.dx, 10);
  const dy = parseInt(btn.dataset.dy, 10);
  btn.addEventListener('pointerdown', (e) => { e.preventDefault(); startJoy(dx, dy); });
  btn.addEventListener('pointerup', stopJoy);
  btn.addEventListener('pointerleave', stopJoy);
  btn.addEventListener('pointercancel', stopJoy);
});
joyCenterBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!currentPhotoImg) return;
  photoX = DIAGRAM / 2; photoY = DIAGRAM / 2;
  render(ctx, currentSections, currentPhotoImg);
});
window.addEventListener('pointerup', stopJoy);
downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  const text = msgInput.value.toUpperCase().trim();
  link.download = (text ? text.slice(0, 20).replace(/[^A-ZА-ЯЇІЄҐ0-9]+/gi, '_') : 'square-code') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  log('PNG завантажено.');
});
downloadSvgBtn.addEventListener('click', () => {
  if (!currentSections) return;
  
  const fullBySide = [null, null, null, null];
  for (let s = 0; s < SECTIONS; s++) {
    const targetSide = (s + 3) % SECTIONS;
    fullBySide[targetSide] = currentSections[s].concat(new Array(RESERVE_BITS_PER_SECTION).fill(0));
  }

  const s = CELL * bitScaleValue;
  const offset = (CELL - s) / 2;

  let svgBeacons = `  <g id="Beacons" fill="${anchorsColor.value}" shape-rendering="crispEdges">\n`;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (isBeaconArea(r, c) && isBeaconPixel(r, c)) {
        const { x, y } = cellTopLeftPx(r, c);
        svgBeacons += `    <rect x="${x + offset}" y="${y + offset}" width="${s}" height="${s}" />\n`;
      }
    }
  }
  svgBeacons += `  </g>\n`;

  const shapeRendering = crossStitchCb.checked ? 'auto' : 'crispEdges';
  let svgData = `  <g id="DataBits" fill="${crossStitchCb.checked ? 'none' : bitsColor.value}" stroke="${crossStitchCb.checked ? bitsColor.value : 'none'}" stroke-linecap="round" stroke-width="${crossStitchCb.checked ? s * 0.35 : 0}" shape-rendering="${shapeRendering}">\n`;
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (isCutout(r, c)) continue;
      if (isQuietRing(r, c)) continue;
      if (isBeaconArea(r, c)) continue;
      const info = SIDE_INDEX_GRID[r][c];
      if (info && fullBySide[info.side][info.idx] === 1) {
        const { x, y } = cellTopLeftPx(r, c);
        if (crossStitchCb.checked) {
          const lw = s * 0.35;
          const inset = lw / 2;
          svgData += `    <line x1="${x + offset + inset}" y1="${y + offset + inset}" x2="${x + offset + s - inset}" y2="${y + offset + s - inset}" />\n`;
          svgData += `    <line x1="${x + offset + s - inset}" y1="${y + offset + inset}" x2="${x + offset + inset}" y2="${y + offset + s - inset}" />\n`;
        } else {
          svgData += `    <rect x="${x + offset}" y="${y + offset}" width="${s}" height="${s}" />\n`;
        }
      }
    }
  }
  svgData += `  </g>\n`;

  const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${DIAGRAM} ${DIAGRAM}">\n${svgBeacons}${svgData}</svg>`;

  const blob = new Blob([svgContent], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const text = msgInput.value.toUpperCase().trim();
  link.download = (text ? text.slice(0, 20).replace(/[^A-ZА-ЯЇІЄҐ0-9]+/gi, '_') : 'square-code') + '.svg';
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
  log('SVG завантажено.');
});

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

let openCvReady = false;

function flushPreLoadLog() {
  if (window.__preLog && window.__preLog.length) {
    window.__preLog.forEach(m => log(m));
    window.__preLog = [];
  }
}
function onCvReady() {
  openCvReady = true;
  flushPreLoadLog();
  log('OpenCV готовий (WASM runtime ініціалізовано).');
  const btn = document.getElementById('camToggleBtn');
  btn.disabled = false;
  btn.textContent = 'Увімкнути камеру';
  document.getElementById('camPlaceholder').textContent = 'Камеру ще не увімкнено';
}
function onCvLoadError() {
  flushPreLoadLog();
  log('OpenCV НЕ завантажився. Камера лишається заблокованою.');
  document.getElementById('camStatus').textContent = 'OpenCV не завантажився — див. лог.';
  document.getElementById('camPlaceholder').textContent = 'OpenCV не завантажився — див. лог';
}
window.__cvReadyCallback = onCvReady;
window.__cvErrorCallback = onCvLoadError;
if (window.__openCvLoadState === 'ready') {
  onCvReady();
} else if (window.__openCvLoadState === 'script-error' || window.__openCvLoadState === 'cv-undefined' || window.__openCvLoadState === 'promise-rejected') {
  onCvLoadError();
} else {
  flushPreLoadLog();
}
setTimeout(() => {
  if (!openCvReady) {
    log(`Попередження: OpenCV досі не готовий через 12с (стан: ${window.__openCvLoadState}).`);
  }
}, 12000);

/* ================================================================
   ДЕТЕКЦІЯ МАЯКІВ — ті самі вкладені контури (рамка -> дірка -> крапка),
   що й на диску, лише пороги площ підігнані під квадратну (а не кругову)
   форму маяка. ЦІ ПОРОГИ НЕ ТЕСТУВАЛИСЯ НАЖИВО З КАМЕРОЮ — стартова
   оцінка з геометрії рендеру, може знадобитись підкрутити SQ_* нижче
   після реального тестування на роздрукованому коді.
   ================================================================ */
function oddify(n) { return (n % 2 === 0) ? n + 1 : n; }
const ADAPTIVE_C = 6;
// Параметри детекції маяка (квадрат 5×5, рамка + порожній проміжок + центральна крапка).
// Взяті з референсу Cam Disc Scanner_10 і підігнані під квадратну (не кругову) форму.
const SQ_MIN_MARKER_AREA = 6;
// Відносна площа крапки до зовнішнього контуру: ідеал 1/25 = 0.04.
const SQ_DOT_AREA_RATIO_MIN = 0.015;
const SQ_DOT_AREA_RATIO_MAX = 0.20;
// Допуск зміщення центрів крапки і рамки відносно "радіуса" зовнішнього квадрата.
const SQ_CONCENTRIC_TOL = 0.4;
// Максимальний розкид розмірів маяків: (max-min)/median — відсіює випадковий шум.
const SQ_SIZE_SPREAD_MAX = 0.6;

function detectSquareFinderCandidates(imgData, W, H) {
  let src, gray, bin, dilated, kernel, hierarchy, contours;
  let contourMats = [];
  const candidates = [];
  try {
    src = cv.matFromImageData(imgData);
    gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    bin = new cv.Mat();
    // Збільшуємо розмір блоку для adaptiveThreshold: якщо камера близько, чорна
    // рамка маяка стає дуже товстою. Малий блок (напр. 21) призведе до того, що
    // середина чорної рамки стане білою. Блок має бути більшим за максимальну
    // товщину чорної лінії.
    const blockSize = Math.max(21, Math.min(111, oddify(Math.round(Math.min(W, H) / 8))));
    cv.adaptiveThreshold(gray, bin, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, blockSize, ADAPTIVE_C);

    // КЛЮЧОВИЙ КРОК: drawCell малює клітини 18×18 з 1px відступом — між
    // сусідніми клітинами рамки маяка залишається 2px зазор, через що
    // OpenCV бачить 16 окремих квадратиків замість одного кільця і не
    // знаходить вкладену структуру рамка→дірка→крапка. Dilation 3×3
    // розширює кожен білий піксель на 1px і зашиває ці 2px зазори.
    kernel = cv.Mat.ones(3, 3, cv.CV_8U);
    dilated = new cv.Mat();
    cv.dilate(bin, dilated, kernel);

    contours = new cv.MatVector();
    hierarchy = new cv.Mat();
    cv.findContours(dilated, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

    const n = contours.size();
    for (let i = 0; i < n; i++) contourMats.push(contours.get(i));
    const hData = hierarchy.data32S;

    for (let i = 0; i < n; i++) {
      const area = cv.contourArea(contourMats[i]);
      if (area < SQ_MIN_MARKER_AREA) continue;
      const holeIdx = hData[i * 4 + 2];
      if (holeIdx < 0) continue;
      const dotIdx = hData[holeIdx * 4 + 2];
      if (dotIdx < 0) continue;

      const dotArea = cv.contourArea(contourMats[dotIdx]);
      const ratio = dotArea / area;
      if (ratio < SQ_DOT_AREA_RATIO_MIN || ratio > SQ_DOT_AREA_RATIO_MAX) continue;

      const mOuter = cv.moments(contourMats[i]);
      const mDot = cv.moments(contourMats[dotIdx]);
      if (mOuter.m00 <= 0 || mDot.m00 <= 0) continue;
      const cxOuter = mOuter.m10 / mOuter.m00, cyOuter = mOuter.m01 / mOuter.m00;
      const cxDot = mDot.m10 / mDot.m00, cyDot = mDot.m01 / mDot.m00;
      // Для квадратного маяка використовуємо sqrt(area) як "радіус" — аналогічно до
      // sqrt(area/PI) у круглому референсі, тільки без PI.
      const size = Math.sqrt(area);
      if (Math.hypot(cxOuter - cxDot, cyOuter - cyDot) > size * SQ_CONCENTRIC_TOL) continue;

      candidates.push({ x: cxOuter, y: cyOuter, size });
    }

  } finally {
    if (contourMats && contourMats.length > 0) {
      contourMats.forEach(m => {
        if (m && typeof m.delete === 'function') m.delete();
      });
    }
    if (src) src.delete();
    if (gray) gray.delete();
    if (bin) bin.delete();
    if (dilated) dilated.delete();
    if (kernel) kernel.delete();
    if (hierarchy) hierarchy.delete();
    if (contours) contours.delete();
  }
  return candidates;
}

function nearestCandidate(candidates, predicted, tolPx) {
  let best = null, bestD = Infinity;
  for (const c of candidates) {
    const d = dist(c, predicted);
    if (d < tolPx && d < bestD) { bestD = d; best = c; }
  }
  return best;
}

// Пошук 4 кутів — портований з референсу coldStartFromQuad:
// НЕ використовує convexHull/approxPolyDP (вони ненадійні при малій кількості
// точок або неідеальних кутах). Замість цього:
// 1. Якщо кандидатів > 4 — вибираємо 4 найближчих до медіанного розміру.
// 2. Перевіряємо розкид розмірів (відсіює шум).
// 3. Сортуємо за кутом навколо центроїда (дає обхід TL->TR->BR->BL).
function findSquareCorners(candidates) {
  if (candidates.length < 4) {
    return { ok: false, reason: `недостатньо маяків (${candidates.length}/4)` };
  }

  let chosen = candidates;
  if (chosen.length > 4) {
    // Вибираємо 4 кандидати найближчі до медіанного розміру маяка
    const sizes = chosen.map(c => c.size).slice().sort((a, b) => a - b);
    const med = sizes[Math.floor(sizes.length / 2)];
    chosen = chosen.slice().sort((a, b) => Math.abs(a.size - med) - Math.abs(b.size - med)).slice(0, 4);
  }
  if (chosen.length !== 4) {
    return { ok: false, reason: `не вдалося вибрати 4 маяки (є ${candidates.length})` };
  }

  // Перевірка: розкид розмірів не має бути надто великим
  const sizes = chosen.map(c => c.size);
  const minS = Math.min(...sizes), maxS = Math.max(...sizes);
  const medS = sizes.slice().sort((a, b) => a - b)[1];
  if (medS > 0 && (maxS - minS) / medS > SQ_SIZE_SPREAD_MAX) {
    return { ok: false, reason: `розмір маяків занадто різний (${minS.toFixed(1)}..${maxS.toFixed(1)})` };
  }

  const cx = chosen.reduce((s, c) => s + c.x, 0) / 4;
  const cy = chosen.reduce((s, c) => s + c.y, 0) / 4;
  // Сортування за кутом — дає стабільний обхід з довільною фазою
  const corners = chosen.slice().sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));

  const avgSize = sizes.reduce((a, b) => a + b, 0) / 4;
  const sideLens = [0, 1, 2, 3].map(i => dist(corners[i], corners[(i + 1) % 4]));
  const avgSide = sideLens.reduce((a, b) => a + b, 0) / 4;
  const scalePx = avgSide / (GRID_SIZE + MARGIN_CELLS * 2);
  return { ok: true, points: corners, scalePx };
}

function trackedFromCandidates(candidates, predictedPts, scalePx) {
  // Допуск: аналогічно референсу — max(12, scalePx * 0.9)
  // scalePx тут = avgSide / 27 ≈ розмір однієї клітини в пікселях
  // Маяк = 5 клітин, тож його "радіус" ≈ scalePx * BEACON_SIZE / 2
  const tol = Math.max(12, scalePx * BEACON_SIZE * 0.9);
  const found = predictedPts.map(p => nearestCandidate(candidates, p, tol));
  if (found.some(f => !f)) return { ok: false, foundCount: found.filter(Boolean).length };
  return { ok: true, points: found };
}

/* ================================================================
   ЧИТАННЯ БІТІВ — cv.warpPerspective у чотирикутник з 4 кутових
   маяків, потім пряма вибірка 55 клітинних центрів на кожній стороні.
   ================================================================ */
function sampleGridMat(imgData, pts) {
  let src, gray, warped, thresh, trans;
  const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    pts[0].x, pts[0].y, pts[1].x, pts[1].y,
    pts[2].x, pts[2].y, pts[3].x, pts[3].y
  ]);
  const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    DST_CORNERS[0].x, DST_CORNERS[0].y,
    DST_CORNERS[1].x, DST_CORNERS[1].y,
    DST_CORNERS[2].x, DST_CORNERS[2].y,
    DST_CORNERS[3].x, DST_CORNERS[3].y
  ]);
  const physicalSides = SIDE_NAMES.map(() => new Array(PHYSICAL_BITS_PER_SIDE).fill(0));
  try {
    src = cv.matFromImageData(imgData);
    gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    trans = cv.getPerspectiveTransform(srcPts, dstPts);
    warped = new cv.Mat();
    cv.warpPerspective(gray, warped, trans, new cv.Size(DIAGRAM, DIAGRAM));
    thresh = new cv.Mat();
    // Оскільки warped - це вирівняний шматок зображення, що містить лише сам код,
    // локальні перепади світла вже не такі критичні. А от великі скупчення чорних клітин
    // ламають adaptiveThreshold (він робить "дірки" всередині чорного масиву).
    // Тому тут надійніше і швидше використовувати глобальний поріг Оцу.
    cv.threshold(warped, thresh, 0, 255, cv.THRESH_BINARY_INV | cv.THRESH_OTSU);

    SIDE_CELL_COORDS.forEach((coords, si) => {
      coords.forEach(({ r, c }, k) => {
        const p = cellCenterPx(r, c);
        const px = Math.round(p.x), py = Math.round(p.y);
        let bit = 0;
        
        // Використовуємо прямий доступ до пам'яті (thresh.data) замість
        // thresh.ucharPtr(), оскільки ucharPtr створює новий об'єкт при кожному
        // виклику і наглухо вішав браузер у циклі (через це завмирали цятки).
        const data = thresh.data;
        const cols = thresh.cols;
        
        if (px >= 4 && px < DIAGRAM - 4 && py >= 4 && py < DIAGRAM - 4) {
          for (let dy = -4; dy <= 4; dy++) {
            for (let dx = -4; dx <= 4; dx++) {
              // Швидкий доступ до пікселя: y * width + x
              if (data[(py + dy) * cols + (px + dx)] > 128) {
                bit = 1; break;
              }
            }
            if (bit) break;
          }
        }
        physicalSides[si][k] = bit;
      });
    });
  } finally {
    if (src) src.delete(); if (gray) gray.delete(); if (warped) warped.delete();
    if (thresh) thresh.delete(); if (trans) trans.delete();
    srcPts.delete(); dstPts.delete();
  }
  return { physicalSides };
}

function reassembleWithRotation(physicalSides) {
  // ВАЖЛИВО: чек-сума (checksum = d0^d1^d2) математично інваріантна щодо
  // циклічного зсуву 4 фізичних сторін — XOR будь-яких 3 з 4 завжди
  // дорівнює 4-й, незалежно від того, яка сторона фізично потрапила на
  // місце "чек-суми". Тобто checksumAgreement() НЕ здатна відрізнити
  // правильний поворот від неправильного (перевірено тестом) — це може
  // зробити лише сам збіг СТАРТ-патерну. А в нього є ~1/64 шанс хибного
  // спрацювання на кожному з 3 НЕправильних поворотів. Тому тут
  // збираються ВСІ 4 варіанти, і рішення приймається лише якщо збіг
  // СТАРТу єдиний — інакше чесно startOk:false замість тихого хибного
  // декодування на випадково знайденому першому збігу.
  const matches = [];
  for (let rot = 0; rot < SECTIONS; rot++) {
    // Знімаємо хаотичну маску перед читанням бітів
    const sections = [0, 1, 2, 3].map(logicalIdx => {
      return physicalSides[(logicalIdx + rot) % SECTIONS].map((b, i) => b ^ getMaskBit(logicalIdx, i));
    });
    const first6 = sections[0].slice(0, BITS_PER_SYMBOL);
    const idx = parseInt(first6.join(''), 2);
    if (idx === START_UK_IDX) matches.push({ sections, rot, lang: 'uk' });
    else if (idx === START_EN_IDX) matches.push({ sections, rot, lang: 'en' });
  }
  if (matches.length === 1) {
    return { sections: matches[0].sections, rot: matches[0].rot, startOk: true, lang: matches[0].lang };
  }
  
  // Якщо старт не знайдено, повертаємо нульовий поворот (також розмаскований) для дебагу
  const sections0 = [0, 1, 2, 3].map(logicalIdx => {
    return physicalSides[logicalIdx].map((b, i) => b ^ getMaskBit(logicalIdx, i));
  });
  return { sections: sections0, rot: 0, startOk: false, lang: 'uk', ambiguous: matches.length > 1 };
}

function checksumAgreement(sections) {
  const [d0, d1, d2, cs] = sections;
  let agree = 0;
  const checkedBits = ACTIVE_BITS_PER_SECTION - BITS_PER_SYMBOL;
  for (let i = BITS_PER_SYMBOL; i < ACTIVE_BITS_PER_SECTION; i++) {
    if ((d0[i] ^ d1[i] ^ d2[i]) === cs[i]) agree++;
  }
  return agree / checkedBits;
}

function detectAndDecode(imgData, W, H, hiImgData, hiW, hiH) {
  if (!openCvReady) return { ok: false, reason: 'OpenCV ще завантажується...', mode: 'loading' };

  const candidates = detectSquareFinderCandidates(imgData, W, H);
  let pts, scalePx, mode;

  if (smoothedCorners) {
    const tr = trackedFromCandidates(candidates, smoothedCorners, smoothedScalePx);
    if (tr.ok) { pts = tr.points; scalePx = smoothedScalePx; mode = 'tracked'; }
  }

  if (!pts) {
    const cs = findSquareCorners(candidates);
    if (!cs.ok) {
      trackingMiss();
      return { ok: false, reason: `${cs.reason} (кандидатів після dilation: ${candidates.length})`, mode: 'cold-fail', candidates };
    }
    pts = cs.points; scalePx = cs.scalePx; mode = 'cold';
  }

  const useHiRes = hiImgData && hiW && hiH;
  const sampleImg = useHiRes ? hiImgData : imgData;
  const scale = useHiRes ? (hiW / W) : 1;
  const samplePts = useHiRes ? pts.map(p => ({ x: p.x * scale, y: p.y * scale })) : pts;

  const { physicalSides } = sampleGridMat(sampleImg, samplePts);
  const { sections, startOk, lang } = reassembleWithRotation(physicalSides);
  const agreement = checksumAgreement(sections);

  updateCornerState(pts, scalePx);

  return { ok: true, mode, pts, scalePx, sections, startOk, agreement, lang, candidates };
}

const CORNER_EMA_ALPHA = 0.35;
const TRACK_LOST_AFTER = 6;
let smoothedCorners = null;
let smoothedScalePx = 0;
let trackMissCount = 0;

function updateCornerState(pts, scalePx) {
  if (!smoothedCorners) {
    smoothedCorners = pts.map(p => ({ ...p }));
    smoothedScalePx = scalePx;
  } else {
    const a = CORNER_EMA_ALPHA;
    smoothedCorners = smoothedCorners.map((sp, i) => ({
      x: sp.x * (1 - a) + pts[i].x * a,
      y: sp.y * (1 - a) + pts[i].y * a
    }));
    smoothedScalePx = smoothedScalePx * (1 - a) + scalePx * a;
  }
  trackMissCount = 0;
}
function trackingMiss() {
  trackMissCount++;
  if (trackMissCount >= TRACK_LOST_AFTER) { smoothedCorners = null; }
}
function resetTracking() { smoothedCorners = null; trackMissCount = 0; }

const CONFIRM_STREAK = 3;
const MIN_AGREEMENT = 0.93;
const STABILITY_TOL_PX = 14;
let recentCentroids = [];
let recentTexts = [];
function centroidOf(pts) { return { x: pts.reduce((s,p)=>s+p.x,0)/pts.length, y: pts.reduce((s,p)=>s+p.y,0)/pts.length }; }
function resetStability() { recentCentroids = []; recentTexts = []; }
function checkStability(centroid, text) {
  recentCentroids.push(centroid);
  recentTexts.push(text);
  if (recentCentroids.length > CONFIRM_STREAK) { recentCentroids.shift(); recentTexts.shift(); }
  if (recentCentroids.length < CONFIRM_STREAK) return false;
  const allSameText = recentTexts.every(t => t === recentTexts[recentTexts.length - 1]);
  if (!allSameText) return false;
  const ref = recentCentroids[recentCentroids.length - 1];
  for (const c of recentCentroids) {
    if (Math.hypot(c.x - ref.x, c.y - ref.y) > STABILITY_TOL_PX) return false;
  }
  return true;
}

let camStream = null;
let scanTimer = null;
let locked = false;

let latestDet = null;
let latestStatusText = '';
let uiAnimFrame = null;
let signalLevel = 0;

// Геометрія прицілу — портретний прямокутник зі скругленими кутами.
// Винесено в окрему функцію, щоб і сама рамка (drawGuide), і імпульсна
// анімація сигналу (uiLoop) використовували однакові цифри — тоді дуга
// імпульсу завжди точно збігається з кривизною скругленого кута рамки.
const GUIDE_WIDTH_RATIO = 0.46;     // ширина прицілу відносно min(W,H) — та сама площа, що й був діаметр кола
const GUIDE_ASPECT_RATIO = 1.3;     // портрет: висота = ширина * 1.3
const GUIDE_CORNER_RADIUS_RATIO = 0.22; // радіус скруглення відносно ширини прицілу

function getGuideGeometry(W, H) {
  const cx = W / 2, cy = H / 2;
  const guideW = Math.min(W, H) * GUIDE_WIDTH_RATIO;
  let guideH = guideW * GUIDE_ASPECT_RATIO;
  const maxH = H * 0.94; // невеликий відступ від країв кадру
  if (guideH > maxH) guideH = maxH;
  const halfW = guideW / 2, halfH = guideH / 2;
  const r = Math.min(guideW, guideH) * GUIDE_CORNER_RADIUS_RATIO;
  return { cx, cy, halfW, halfH, r };
}

function roundedRectPath(g, cx, cy, halfW, halfH, r) {
  const x0 = cx - halfW, y0 = cy - halfH, x1 = cx + halfW, y1 = cy + halfH;
  g.beginPath();
  g.moveTo(x0 + r, y0);
  g.lineTo(x1 - r, y0);
  g.arcTo(x1, y0, x1, y0 + r, r);
  g.lineTo(x1, y1 - r);
  g.arcTo(x1, y1, x1 - r, y1, r);
  g.lineTo(x0 + r, y1);
  g.arcTo(x0, y1, x0, y1 - r, r);
  g.lineTo(x0, y0 + r);
  g.arcTo(x0, y0, x0 + r, y0, r);
  g.closePath();
}

function drawGuide(W, H) {
  const gc = document.getElementById('guideCanvas');
  const dpr = window.devicePixelRatio || 1;
  gc.width = W * dpr;
  gc.height = H * dpr;
  const g = gc.getContext('2d');
  g.scale(dpr, dpr);
  g.clearRect(0, 0, W, H);
  const { cx, cy, halfW, halfH, r } = getGuideGeometry(W, H);

  g.fillStyle = '#154569';
  g.fillRect(0, 0, W, H);
  g.globalCompositeOperation = 'destination-out';
  g.fillStyle = '#000';
  roundedRectPath(g, cx, cy, halfW, halfH, r);
  g.fill();
  g.globalCompositeOperation = 'source-over';
  g.lineWidth = 2;
  g.strokeStyle = '#ffffff';
  roundedRectPath(g, cx, cy, halfW, halfH, r);
  g.stroke();
}
function clearGuide() {
  const gc = document.getElementById('guideCanvas');
  gc.getContext('2d').clearRect(0, 0, gc.width, gc.height);
}
window.addEventListener('resize', () => {
  if (camStream) {
    const wrap = document.getElementById('camWrap');
    drawGuide(wrap.clientWidth || 320, wrap.clientHeight || 320);
  }
});

async function toggleCamera() {
  if (!openCvReady) return;
  const btn = document.getElementById('camToggleBtn');
  if (camStream) { stopCamera(); btn.textContent = 'Увімкнути камеру'; return; }
  log('Запит доступу до камери...');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 720 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('camVideo');
    video.srcObject = camStream;
    await new Promise((resolve) => { if (video.readyState >= 1) { resolve(); return; } video.onloadedmetadata = () => resolve(); });
    await video.play();
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camLive').classList.add('active');
    const wrapEl = document.getElementById('camWrap');
    drawGuide(wrapEl.clientWidth || video.videoWidth || 320, wrapEl.clientHeight || video.videoHeight || 320);
    btn.textContent = 'Вимкнути камеру';
    document.getElementById('rescanBtn').style.display = 'none';
    document.getElementById('camResultsBox').innerHTML = '';
    locked = false;
    resetStability();
    resetTracking();
    latestDet = null;
    latestStatusText = '';
    signalLevel = 0;
    uiAnimFrame = requestAnimationFrame(uiLoop);
    scanTimer = setInterval(scanFrame, 200);
  } catch (e) {
    log(`ПОМИЛКА камери: ${e.message}`);
  }
}
function stopCamera() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (uiAnimFrame) { cancelAnimationFrame(uiAnimFrame); uiAnimFrame = null; }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('camVideo').srcObject = null;
  document.getElementById('camLive').classList.remove('active');
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camStatus').textContent = 'Камеру вимкнено.';
  locked = false;
  resetStability();
  resetTracking();
  const oc = document.getElementById('overlayCanvas');
  oc.getContext('2d').clearRect(0, 0, oc.width, oc.height);
  clearGuide();
  document.getElementById('scanStatusOverlay').textContent = '';
}

function uiLoop() {
  if (!camStream) return;
  const wrapEl = document.getElementById('camWrap');
  const W = wrapEl.clientWidth || 320;
  const H = wrapEl.clientHeight || 320;
  
  const oc = document.getElementById('overlayCanvas');
  const dpr = window.devicePixelRatio || 1;
  oc.width = W * dpr;
  oc.height = H * dpr;
  const octx = oc.getContext('2d');
  octx.scale(dpr, dpr);
  octx.clearRect(0, 0, W, H);
  
  const { halfW, halfH, r } = getGuideGeometry(W, H);
  // Центр дуги скруглення правого-нижнього кута прицілу — та сама точка,
  // якою намальована сама крива в roundedRectPath, тож дуги імпульсу
  // ідеально продовжують кривизну кута рамки.
  const cornerCx = W / 2 + halfW - r;
  const cornerCy = H / 2 + halfH - r;
  const radius = r;
  
  const targetSignal = (latestDet && latestDet.pts && !locked) ? 1.0 : 0.0;
  signalLevel += (targetSignal - signalLevel) * 0.15; 
  
  if (signalLevel > 0.01 && !locked) {
    octx.lineWidth = 2;
    octx.strokeStyle = '#ffffff';
    octx.lineCap = 'round';
    
    const baseAngle = Math.PI / 4; // 45 градусів — середина дуги скруглення правого-нижнього кута
    
    let p1 = Math.min(1, Math.max(0, signalLevel * 3));
    if (p1 > 0) { 
      let spread = (Math.PI / 16) * p1; 
      octx.beginPath(); octx.arc(cornerCx, cornerCy, radius + 8, baseAngle - spread, baseAngle + spread); octx.stroke(); 
    }
    
    let p2 = Math.min(1, Math.max(0, (signalLevel - 0.33) * 3));
    if (p2 > 0) { 
      let spread = (Math.PI / 10) * p2; 
      octx.beginPath(); octx.arc(cornerCx, cornerCy, radius + 16, baseAngle - spread, baseAngle + spread); octx.stroke(); 
    }
    
    let p3 = Math.min(1, Math.max(0, (signalLevel - 0.66) * 3));
    if (p3 > 0) { 
      let spread = (Math.PI / 7) * p3; 
      octx.beginPath(); octx.arc(cornerCx, cornerCy, radius + 24, baseAngle - spread, baseAngle + spread); octx.stroke(); 
    }
  }
  
  const debugCb = document.getElementById('debugBeaconsCb');
  if (debugCb && debugCb.checked && latestDet && !locked) {
    if (latestDet.candidates) {
      octx.fillStyle = 'rgba(255,255,0,0.8)';
      for (const c of latestDet.candidates) { octx.beginPath(); octx.arc(c.x, c.y, 4, 0, Math.PI*2); octx.fill(); }
    }
    if (latestDet.pts) {
      const pts = latestDet.pts;
      octx.strokeStyle = 'rgba(120,220,120,0.9)';
      octx.lineWidth = 2;
      octx.beginPath(); octx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < 4; i++) octx.lineTo(pts[i].x, pts[i].y);
      octx.closePath(); octx.stroke();
      octx.fillStyle = 'rgba(255,200,80,0.9)';
      for (const p of pts) { octx.beginPath(); octx.arc(p.x, p.y, 5, 0, Math.PI*2); octx.fill(); }
    }
  }
  
  if (!locked) {
    document.getElementById('scanStatusOverlay').textContent = latestStatusText || '';
  }
  
  uiAnimFrame = requestAnimationFrame(uiLoop);
}

function drawDecodedOverlay(W, H, det) {
  const oc = document.getElementById('overlayCanvas');
  const dpr = window.devicePixelRatio || 1;
  oc.width = W * dpr;
  oc.height = H * dpr;
  const octx = oc.getContext('2d');
  octx.scale(dpr, dpr);
  octx.clearRect(0, 0, W, H);
  const pts = det.pts;

  octx.fillStyle = 'rgba(40,110,210,0.28)';
  octx.beginPath();
  octx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < 4; i++) octx.lineTo(pts[i].x, pts[i].y);
  octx.closePath();
  octx.fill();
  octx.strokeStyle = 'rgba(120,220,120,0.9)';
  octx.lineWidth = 2;
  octx.stroke();
  octx.fillStyle = 'rgba(255,200,80,0.95)';
  for (const p of pts) { octx.beginPath(); octx.arc(p.x, p.y, 5, 0, Math.PI*2); octx.fill(); }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let frameCounter = 0;
function scanFrame() {
  if (locked) return;
  const video = document.getElementById('camVideo');
  const wrap = document.getElementById('camWrap');
  if (!camStream || video.readyState < 2) return;

  const loSize = wrap.clientWidth || 320;
  const vw = video.videoWidth, vh = video.videoHeight;
  const hiSize = vw && vh ? Math.min(Math.min(vw, vh), 640) : loSize;

  const hiCanvas = document.createElement('canvas');
  hiCanvas.width = hiSize; hiCanvas.height = hiSize;
  const hctx = hiCanvas.getContext('2d', { willReadFrequently: true });
  if (vw && vh) {
    const sSize = Math.min(vw, vh);
    const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
    hctx.drawImage(video, sx, sy, sSize, sSize, 0, 0, hiSize, hiSize);
  } else {
    hctx.drawImage(video, 0, 0, hiSize, hiSize);
  }
  const hiImgData = hctx.getImageData(0, 0, hiSize, hiSize);

  const loCanvas = document.createElement('canvas');
  loCanvas.width = loSize; loCanvas.height = loSize;
  const cctx = loCanvas.getContext('2d', { willReadFrequently: true });
  cctx.drawImage(hiCanvas, 0, 0, hiSize, hiSize, 0, 0, loSize, loSize);
  const imgData = cctx.getImageData(0, 0, loSize, loSize);

  const size = loSize;
  const det = detectAndDecode(imgData, size, size, hiImgData, hiSize, hiSize);
  frameCounter++;

  if (!det.ok) {
    recentCentroids = []; recentTexts = [];
    latestDet = det; latestStatusText = `Шукаю якорі... (${det.reason})`;
    document.getElementById('camStatus').textContent = `Пошук: ${det.reason}`;
    if (frameCounter % 5 === 0) log(`Кадр ${frameCounter}: ${det.reason}`);
    return;
  }
  if (!det.startOk || det.agreement < MIN_AGREEMENT) {
    recentCentroids = []; recentTexts = [];
    const reason = !det.startOk ? 'старт-символ не збігається' : `узгодженість чексуми ${(det.agreement*100).toFixed(0)}%`;
    latestDet = det; latestStatusText = `Маяки знайдено (${det.mode}), ${reason}`;
    document.getElementById('camStatus').textContent = `Кандидат — ${reason}, шукаю стабільніший кадр...`;
    if (frameCounter % 5 === 0) log(`Кадр ${frameCounter}: маяки зловлено (${det.mode}), ${reason}`);
    return;
  }

  let votedText;
  try {
    votedText = decodeSectionsToText(det.sections, det.lang);
  } catch (e) {
    votedText = '';
  }
  const centroid = centroidOf(det.pts);
  const stable = checkStability(centroid, votedText + '|' + det.lang);

  latestDet = det; latestStatusText = stable ? 'Стабільно, декодую...' : `Стабілізація... (${recentCentroids.length}/${CONFIRM_STREAK}) [${det.mode}, ${det.lang}]`;
  document.getElementById('camStatus').textContent = stable
    ? 'Впевнено знайдено — декодую.'
    : `Кандидат (чексума ${(det.agreement*100).toFixed(0)}%, ${det.mode}, ${det.lang}) — стабілізація ${recentCentroids.length}/${CONFIRM_STREAK}`;

  if (stable) {
    locked = true;
    log(`Зафіксовано: режим=${det.mode}, мова=${det.lang}, чексума=${(det.agreement*100).toFixed(1)}%, текст="${votedText}".`);
    finishDecode(size, size, det, votedText);
  }
}

function finishDecode(W, H, det, votedText) {
  drawDecodedOverlay(W, H, det);
  const upperText = votedText.toUpperCase();
  document.getElementById('camResultsBox').innerHTML =
    `<div class="capacity-note" style="margin-bottom:6px;">Мова: ${det.lang === 'en' ? 'латиниця' : 'кирилиця'}</div>` +
    `<div class="final-result">${escapeHtml(upperText)}</div>`;
  document.getElementById('rescanBtn').style.display = 'block';
  log(`Результат: ${upperText}`);
}

function rescan() {
  locked = false;
  resetStability();
  resetTracking();
  document.getElementById('camResultsBox').innerHTML = '';
  document.getElementById('rescanBtn').style.display = 'none';
  const oc = document.getElementById('overlayCanvas');
  oc.getContext('2d').clearRect(0, 0, oc.width, oc.height);
}

document.getElementById('camToggleBtn').addEventListener('click', toggleCamera);
document.getElementById('rescanBtn').addEventListener('click', rescan);
document.getElementById('copyLogBtn').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('logBox').value); });
document.getElementById('clearLogBtn').addEventListener('click', () => { document.getElementById('logBox').value = ''; });

renderAlphabetBlocks();
refresh();
</script>
